[package]
name = "evdev-hotkey"
version = "0.1.0"
edition = "2021"
authors = ["Josh Thomas <josh@joshthomas.dev>"]
description = "Global hotkey listener for Linux using evdev (X11 + Wayland)"
license = "MIT"
repository = "https://github.com/joshuadavidthomas/evdev-hotkey"
keywords = ["hotkey", "global-shortcut", "evdev", "linux", "input"]
categories = ["os::linux-apis", "api-bindings"]
readme = "README.md"

[features]
default = ["evdev"]
evdev = []
portal = ["dep:ashpd", "dep:async-std"]
grab = ["evdev"]
tokio = ["dep:tokio", "dep:async-channel"]
async-std = ["dep:async-std", "dep:async-channel"]

[dependencies]
evdev = "0.13"
libc = "0.2"
tracing = "0.1"
ashpd = { version = "0.9.2", optional = true, default-features = false, features = ["async-std"] }
async-std = { version = "1.13", optional = true }
async-channel = { version = "2.3", optional = true }
tokio = { version = "1.44", optional = true, default-features = false, features = ["rt"] }
