[package]
name = "keybound"
version = "0.1.0"
edition = "2021"
authors = ["Josh Thomas <josh@joshthomas.dev>"]
description = "Global hotkey library for Linux — works on Wayland, X11, and TTY"
license = "MIT"
repository = "https://github.com/joshuadavidthomas/keybound"
keywords = ["hotkey", "global-shortcut", "keybinding", "wayland", "input"]
categories = ["os::linux-apis", "api-bindings"]
readme = "README.md"

[features]
default = ["evdev"]
evdev = []
portal = ["dep:ashpd", "dep:async-std"]
grab = ["evdev"]
tokio = ["dep:tokio", "dep:async-channel"]
async-std = ["dep:async-std", "dep:async-channel"]
serde = ["dep:serde"]

[dependencies]
evdev = "0.13"
libc = "0.2"
tracing = "0.1"
ashpd = { version = "0.12", optional = true, default-features = false, features = ["async-std"] }
async-std = { version = "1.13", optional = true }
async-channel = { version = "2.3", optional = true }
tokio = { version = "1.44", optional = true, default-features = false, features = ["rt"] }
serde = { version = "1.0", optional = true, features = ["derive"] }
thiserror = "2.0"

[dev-dependencies]
serde_json = "1.0"
toml = "1.0"

# [[example]]
# name = "async_stream"
# required-features = ["tokio"]

# [[example]]
# name = "config_file"
# required-features = ["serde"]

# [[example]]
# name = "grab"
# required-features = ["grab"]

# [[example]]
# name = "tap_hold"
# required-features = ["grab"]

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
missing_errors_doc = "allow"
