# TODO: after 1.0, switch to independent versioning per-crate
# - remove version_group from each [[package]]
# - switch to per-crate changelogs (remove changelog_path overrides)

[workspace]
changelog_update = true
semver_check = true
git_tag_enable = true
git_release_enable = true
publish_allow_dirty = false

[[package]]
name = "kbd"
version_group = "kbd"
changelog_path = "CHANGELOG.md"

[[package]]
name = "kbd-crossterm"
version_group = "kbd"
changelog_path = "CHANGELOG.md"

[[package]]
name = "kbd-egui"
version_group = "kbd"
changelog_path = "CHANGELOG.md"

[[package]]
name = "kbd-evdev"
version_group = "kbd"
changelog_path = "CHANGELOG.md"

[[package]]
name = "kbd-global"
version_group = "kbd"
changelog_path = "CHANGELOG.md"

[[package]]
name = "kbd-iced"
version_group = "kbd"
changelog_path = "CHANGELOG.md"

[[package]]
name = "kbd-tao"
version_group = "kbd"
changelog_path = "CHANGELOG.md"

[[package]]
name = "kbd-winit"
version_group = "kbd"
changelog_path = "CHANGELOG.md"

# excluded from releases
[[package]]
name = "kbd-derive"
release = false
publish = false

[[package]]
name = "kbd-portal"
release = false
publish = false

[[package]]
name = "kbd-xkb"
release = false
publish = false

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]

"""
body = """
## [{{ version }}]{%- if release_link -%}({{ release_link }}){% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | upper_first }}
  {% for commit in commits %}
    {%- if commit.scope -%}
      - *({{commit.scope}})* {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message }}{%- if commit.links %} ({% for link in commit.links %}[{{link.text}}]({{link.href}}) {% endfor -%}){% endif %}
    {% else -%}
    - {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message }}
    {% endif -%}
  {% endfor -%}
{% endfor %}
"""
trim = true
