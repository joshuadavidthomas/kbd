name: codspeed

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codspeed.yml
      - crates/**
      - Cargo.toml
      - Cargo.lock
  pull_request:
    paths:
      - .github/workflows/codspeed.yml
      - crates/**
      - Cargo.toml
      - Cargo.lock
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmarks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c
        with:
          cache: true

      - name: Install cargo-codspeed
        run: cargo install cargo-codspeed@4.3.0 --locked

      - name: Build benchmarks
        run: cargo codspeed build --package kbd

      - name: Run benchmarks
        uses: CodSpeedHQ/action@281164b0f014a4e7badd2c02cecad9b595b70537 # v4.11.1
        with:
          mode: simulation
          run: cargo codspeed run --package kbd
