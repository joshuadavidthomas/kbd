name: test

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/test.yml
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - Justfile
  push:
    branches: [main]
    paths:
      - .github/workflows/test.yml
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - Justfile
  workflow_call:
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  should-run:
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, ':bookmark: bump version') }}"
    runs-on: ubuntu-latest
    steps:
      - run: true

  test:
    runs-on: ubuntu-24.04
    needs: [should-run]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: true

      - name: Run tests
        run: cargo test -q --all-features
