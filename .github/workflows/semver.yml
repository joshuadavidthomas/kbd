name: semver

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/semver.yml
      - crates/**
      - Cargo.toml
      - Cargo.lock

concurrency:
  group: semver-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  semver-checks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c
        with:
          cache: true

      - uses: taiki-e/install-action@205eb1d74c6feda89abb1f3a09360601953286c0 # v2.68.18
        with:
          tool: cargo-semver-checks

      - name: Run semver checks
        id: semver
        env:
          NO_COLOR: 1
        run: |
          if cargo semver-checks check-release \
            --workspace \
            --baseline-rev "origin/${{ github.base_ref }}" \
            2>&1 | tee /tmp/semver-output.txt; then
            echo "breaking=false" >> "$GITHUB_OUTPUT"
          else
            echo "breaking=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate comment
        run: |
          if [ "${{ steps.semver.outputs.breaking }}" = "true" ]; then
            HEADER="⚠️ Breaking API changes detected"
          else
            HEADER="✅ No breaking API changes detected"
          fi

          {
            echo "## 📦 Semver Checks"
            echo ""
            echo "$HEADER"
            echo ""
            echo "<details>"
            echo "<summary>Details</summary>"
            echo ""
            echo '```'
            cat /tmp/semver-output.txt
            echo '```'
            echo ""
            echo "</details>"
          } | tee "$GITHUB_STEP_SUMMARY" > /tmp/semver-comment.md

      - name: Post PR comment
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: semver-checks
          path: /tmp/semver-comment.md
